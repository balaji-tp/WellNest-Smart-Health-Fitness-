spring.application.name=wellnest

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/wellnest_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=monishraj

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Configuration (Custom)
wellnest.app.jwtSecret=wellnestSecretKeyForJwtGenerationNeedsToBeLongEnough32BytesMinimumWellnestApp2026
wellnest.app.jwtExpirationMs=86400000

# Server Port
server.port=8081
